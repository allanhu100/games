<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>allanhu100 - Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            padding: 15px;
            background-color: #ffffff;
        }

        h1 {
            margin-bottom: 15px;
        }

        .game-button {
            --color: #0077ff;
            font-family: inherit;
            display: inline-block;
            width: 6em;
            height: 2.6em;
            line-height: 2.5em;
            overflow: hidden;
            cursor: pointer;
            margin: 10px;
            font-size: 17px;
            z-index: 1;
            color: var(--color);
            border: 2px solid var(--color);
            border-radius: 5px;
            position: relative;
            text-decoration: none;
            text-align: center;
        }

        .game-button::before {
            position: absolute;
            content: "";
            background: var(--color);
            width: 150px;
            height: 200px;
            z-index: -1;
            border-radius: 50%;
            top: 100%;
            left: 100%;
            transition: 0.3s all;
        }

        .game-button:hover {
            color: white;
        }

        .game-button:hover::before {
            top: -30px;
            left: -30px;
        }
    </style>
</head>
<body>
    <h1>My Games</h1>
    <a href="https://allanhu100.github.io/redirect?id=dino_game&source=games_page" class="game-button">Dino Game</a>
    <a href="https://allanhu100.github.io/redirect?id=tic_tac_toe&source=games_page" class="game-button">Tic-Tac-Toe</a>
    
    <a href="https://allanhu100.github.io/redirect?id=home&source=games_page" class="masked-link">Return To Home</a>
    <footer class="footer">
        &copy; Allan Hu
    </footer>
</body>
</html>
